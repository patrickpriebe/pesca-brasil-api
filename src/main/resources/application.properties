spring.application.name=brazil

spring.profiles.active=local

# ==========================================
# CONFIGURAÇÕES GERAIS (Não são segredo)
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================
# ESTRUTURA DE VARIÁVEIS (Serão preenchidas no Render)
# ==========================================
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}

google.recaptcha.secret=${RECAPTCHA_SECRET:}
jwt.secret=${JWT_SECRET:ChaveTemporariaApenasParaEvitarErrosDeInicializacaoLocal123}